version: "3.8"

services:
  sakura-anime:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - ANIME_API_URL=${ANIME_API_URL:-}
      - ANIME_API_BACKUP_URL=${ANIME_API_BACKUP_URL:-}
      - CRAWL_API_KEY=${CRAWL_API_KEY:-}
    volumes:
      - sakura-data:/app/prisma
    restart: unless-stopped

volumes:
  sakura-data:
